name: Update water quality dashboard

on:
  schedule:
    # GitHub Actions cron always runs in UTC and can't express "Finland local
    # time" directly, so we schedule both possible UTC offsets for 09:30
    # Europe/Helsinki (EEST = UTC+3 in summer, EET = UTC+2 in winter) and let
    # the `gate` job below skip whichever one doesn't match the current
    # local hour. GitHub's scheduler can also delay runs by minutes to hours
    # during peak load.
    - cron: "30 6 * * *"  # 09:30 EEST (summer, UTC+3)
    - cron: "30 7 * * *"  # 09:30 EET  (winter, UTC+2)
  workflow_dispatch:
    inputs:
      force_refit:
        description: "Force model refit and re-render even if no new data was fetched"
        type: boolean
        default: false
  push:
    branches: [main]

permissions:
  contents: write

# Only one Pages deployment at a time; let in-flight runs finish.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  gate:
    # Only relevant for the schedule trigger: with two cron entries covering
    # both DST offsets, exactly one fires at real 09:30 Helsinki time and the
    # other should be a no-op. Manual dispatches and pushes always proceed.
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            hour=$(TZ='Europe/Helsinki' date +%H)
            if [ "$hour" != "09" ]; then
              echo "Skipping: it's $hour:00 in Helsinki, not the 09:xx slot this cron entry targets."
              echo "run=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "run=true" >> "$GITHUB_OUTPUT"

  build:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.2"
          use-public-rspm: true

      - uses: r-lib/actions/setup-renv@v2

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Install system dependencies (pdftotext for bacteria PDF parsing)
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Fetch new data (rain, flow, and bacteria all auto-applied)
        run: Rscript R/00_fetch_data.R

      - name: Force model refit (manual override)
        if: ${{ github.event.inputs.force_refit == 'true' }}
        run: rm -f output/model_entero.rds output/model_coli.rds

      - name: Run model + prediction pipeline
        run: Rscript main.R

      - name: Render dashboard
        run: quarto render dashboard.qmd

      - name: Commit updated data & model outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ output/ dashboard.html dashboard_files/
          git diff --staged --quiet || git commit -m "Automated data update $(date -u +%Y-%m-%d)"
          git push

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp dashboard.html _site/index.html
          cp -r dashboard_files _site/dashboard_files

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
